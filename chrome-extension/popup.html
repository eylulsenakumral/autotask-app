<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoTask</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      color: #ededed;
    }

    .header {
      padding: 20px;
      background: linear-gradient(90deg, #ff6b35 0%, #f72585 100%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header .status {
      font-size: 12px;
      opacity: 0.9;
      margin-top: 4px;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00ff88;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    .status-dot.error {
      background: #ff3366;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .content {
      padding: 20px;
    }

    .section {
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 12px;
    }

    .workflow-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .workflow-item {
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .workflow-item:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 107, 53, 0.5);
    }

    .workflow-item.active {
      background: rgba(255, 107, 53, 0.1);
      border-color: #ff6b35;
    }

    .workflow-name {
      font-size: 14px;
      font-weight: 500;
    }

    .workflow-desc {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }

    .button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .button-primary {
      background: linear-gradient(90deg, #ff6b35 0%, #f72585 100%);
      color: white;
    }

    .button-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(255, 107, 53, 0.3);
    }

    .button-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #ededed;
    }

    .button-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }

    .empty-state svg {
      width: 48px;
      height: 48px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      border-radius: 4px;
      background: rgba(255, 107, 53, 0.2);
      color: #ff6b35;
    }

    .footer {
      padding: 16px 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      gap: 8px;
    }

    .log-entry {
      font-size: 11px;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 4px;
      margin-bottom: 8px;
      font-family: 'Monaco', 'Consolas', monospace;
    }

    .log-entry.success {
      color: #00ff88;
    }

    .log-entry.error {
      color: #ff3366;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>AutoTask</h1>
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Ready</span>
    </div>
  </div>

  <div class="content">
    <div class="section" id="workflowsSection">
      <div class="section-title">Workflows</div>
      <div class="workflow-list" id="workflowList">
        <!-- Workflows loaded dynamically -->
      </div>
    </div>

    <div class="section hidden" id="logsSection">
      <div class="section-title">Execution Log</div>
      <div id="logsContainer"></div>
    </div>

    <div class="empty-state hidden" id="emptyState">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
      </svg>
      <p>No workflows yet.<br>Create one in the dashboard.</p>
    </div>
  </div>

  <div class="footer">
    <button class="button button-secondary" id="stopBtn" disabled>Stop</button>
    <button class="button button-primary" id="runBtn" disabled>Run Workflow</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
